<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Académico Interactivo</title>
    <style>
        :root {
            --bg-sidebar: #1a252f;
            --accent-gold: #d4af37;
            --text-light: #ffffff;
            --text-dark: #2c3e50;
            --bg-main: #fcfcfc;
        }

        body {
            margin: 0;
            display: flex;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
            z-index: 10;
        }

        .sidebar h2 {
            font-family: 'Georgia', serif;
            font-size: 22px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 15px;
            font-size: 13px;
            color: #bdc3c7;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--text-light);
            background: var(--accent-gold);
            font-weight: bold;
            border-radius: 4px;
        }

        /* Main Content con Animación */
        .main {
            flex: 1;
            padding: 80px;
            background-color: var(--bg-main);
            overflow-y: auto;
        }

        /* Clase para el efecto de transición */
        .fade-in {
            animation: fadeInEffect 0.6s ease-in-out;
        }

        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .breadcrumb {
            font-size: 14px;
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 55px;
            color: var(--text-dark);
            margin: 0 0 30px 0;
        }

        .info-card {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 10px 10px 0px #eee;
            border: 1px solid #ddd;
            max-width: 850px;
        }

        p { line-height: 1.8; color: #555; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard <i>Matemático</i></h2>
        <div class="nav-menu">
            <div class="nav-item active" onclick="update(this, '01. INTRODUCCIÓN', 'Análisis <i>Curricular</i>', 'Aquí puedes poner la síntesis inicial de la tarea...')">01. Inicio</div>
            <div class="nav-item" onclick="update(this, '02. CRONOLOGÍA', 'Evolución <span>Histórica</span>', 'Contenido sobre la historia del currículo...')">02. Cronología</div>
            <div class="nav-item" onclick="update(this, '04. CONCRECIÓN', 'Arquitectura del <span>Sistema</span>', 'Niveles Macro, Meso y Micro del sistema educativo.')">04. Concreción</div>
        </div>
    </div>

    <div class="main" id="content-area">
        <div id="breadcrumb" class="breadcrumb">01. INTRODUCCIÓN</div>
        <h1 id="main-title">Análisis <i>Curricular</i></h1>
        
        <div class="info-card">
            <p id="card-detail">Bienvenido al dashboard interactivo. Haz clic en las opciones del menú para navegar por la información.</p>
        </div>
    </div>

    <script>
        function update(element, label, title, detail) {
            const contentArea = document.getElementById('content-area');
            
            // 1. Quitar la animación anterior para poder reiniciarla
            contentArea.classList.remove('fade-in');
            void contentArea.offsetWidth; // Truco técnico para reiniciar la animación
            
            // 2. Cambiar los textos
            document.getElementById('breadcrumb').innerText = label;
            document.getElementById('main-title').innerHTML = title;
            document.getElementById('card-detail').innerHTML = detail;

            // 3. Añadir la animación de nuevo
            contentArea.classList.add('fade-in');

            // 4. Actualizar el botón activo
            const items = document.querySelectorAll('.nav-item');
            items.forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
