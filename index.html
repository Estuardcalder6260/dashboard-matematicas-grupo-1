<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Académico</title>
    <style>
        :root {
            /* NUEVA PALETA DE COLORES: Azul y Dorado */
            --bg-sidebar: #1a252f;      /* Azul oscuro profundo */
            --accent-gold: #d4af37;      /* Dorado elegante */
            --text-light: #ffffff;
            --text-dark: #2c3e50;
            --bg-main: #fcfcfc;
        }

        body {
            margin: 0;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background-color: var(--bg-main);
        }

        /* Sidebar - Ahora es oscura para resaltar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
        }

        .sidebar h2 {
            font-family: 'Georgia', serif;
            font-size: 24px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-menu { list-style: none; padding: 0; }

        .nav-item {
            padding: 12px 15px;
            font-size: 13px;
            color: #bdc3c7;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 8px;
            transition: 0.3s;
            border-radius: 4px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--accent-gold);
        }

        .nav-item.active {
            color: var(--text-light);
            background: var(--accent-gold);
            font-weight: bold;
        }

        /* Contenido Principal */
        .main {
            flex: 1;
            padding: 80px;
            overflow-y: auto;
        }

        .breadcrumb {
            font-size: 14px;
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 60px;
            color: var(--text-dark);
            margin: 0 0 30px 0;
        }

        h1 span {
            color: var(--accent-gold);
            font-style: italic;
        }

        /* Tarjeta de información mejorada */
        .info-card {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 10px 10px 0px #eee; /* Sombra sólida moderna */
            border: 1px solid #ddd;
            max-width: 850px;
        }

        .info-card h2 {
            font-size: 20px;
            color: var(--text-dark);
            line-height: 1.5;
            margin-top: 0;
        }

        .info-card p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard <i>Educativo</i></h2>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="update('INTRODUCCIÓN', 'Marco <span>Conceptual</span> del Área', 'Aquí inicia la explicación del proyecto de matemáticas...')">01. Inicio</li>
            <li class="nav-item" onclick="update('HISTORIA', 'Línea de <span>Tiempo</span> Educativa', 'Contenido proporcionado por tus compañeros sobre la evolución...')">02. Cronología</li>
            <li class="nav-item" onclick="update('ESTRUCTURA', 'Niveles de <span>Concreción</span>', 'Detalles sobre los niveles Macro, Meso y Micro del sistema.')">03. Estructura</li>
        </ul>
    </div>

    <div class="main">
        <div id="breadcrumb" class="breadcrumb">INTRODUCCIÓN</div>
        <h1 id="main-title">Marco <span>Conceptual</span> del Área</h1>
        
        <div class="info-card">
            <h2 id="card-desc">Selecciona una sección del menú lateral para cargar la información detallada de la tarea.</h2>
            <p id="card-detail">Este dashboard interactivo presenta el análisis curricular de forma dinámica y profesional.</p>
        </div>
    </div>

    <script>
