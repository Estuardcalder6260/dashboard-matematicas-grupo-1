<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Interactivo</title>
    <style>
        /* Estilos básicos para que se vea como tu imagen */
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
        .sidebar { width: 250px; background: #f4f7f6; padding: 40px; border-right: 1px solid #ddd; }
        .main { flex: 1; padding: 60px; }
        .nav-item { padding: 10px; cursor: pointer; color: #666; margin-bottom: 10px; }
        .nav-item:hover { color: #000; font-weight: bold; }
        .active { color: #000; font-weight: bold; border-left: 3px solid #5d7c67; padding-left: 7px; }
        .content-box { border: 1px solid #eee; padding: 30px; border-radius: 10px; background: #fafafa; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Análisis <br><i style="color: #5d7c67;">Curricular</i></h2>
        <div class="nav-item" onclick="cambiarContenido('SÍNTESIS', 'Resumen general de la materia...')">01. SÍNTESIS</div>
        <div class="nav-item" onclick="cambiarContenido('CRONOLOGÍA', 'Línea de tiempo de los cambios...')">02. CRONOLOGÍA</div>
        <div class="nav-item active" id="btn-default" onclick="cambiarContenido('CONCRECIÓN', 'Aquí va la info de los niveles macro, meso y micro.')">04. CONCRECIÓN</div>
    </div>

    <div class="main">
        <h1 id="titulo-principal">Arquitectura del Sistema</h1>
        <div class="content-box">
            <p id="texto-detalle">Haz clic en una opción de la izquierda para ver la información.</p>
        </div>
    </div>

    <script>
        // Esta es la "magia" que hace que cambie sin que sepas programar
        function cambiarContenido(titulo, detalle) {
            document.getElementById('titulo-principal').innerText = titulo;
            document.getElementById('texto-detalle').innerText = detalle;
            
            // Esto cambia el color del botón para saber cuál está seleccionado
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
